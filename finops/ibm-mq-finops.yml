specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: IBM MQ
providerId: ibm-mq
publisherName: IBM Corporation
serviceCategory: Messaging + Integration
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Async
  - Enterprise
  - Integration
  - Messaging
  - Middleware
  - Queue
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for IBM MQ. The product is delivered both as IBM Cloud-managed
  reserved-capacity deployments (subscription per deployment-month) and as on-premises licensed software
  (PVU / VPC capacity license + S&S). Cost lines are deployment subscriptions, optional egress, and add-ons;
  on-prem invoices are handled via IBM Passport Advantage.
notes: Reserved-capacity dollar amounts intentionally omitted; reconcile against the IBM Cloud catalog
  before flipping reconciled to true.
sources:
  - https://www.ibm.com/products/mq
  - https://cloud.ibm.com/catalog/services/mq
principles:
  - name: Visibility
    description: For IBM MQ on Cloud, use the IBM Cloud Usage and Billing dashboard plus the Enterprise
      Billing API to see deployment-month charges by region. For on-prem, surface usage via IBM License
      Metric Tool (ILMT) PVU reports.
  - name: Allocation
    description: Tag IBM Cloud resources with team, environment, and application tags so charges in the
      Cost and Asset Management exports allocate cleanly. For on-prem, attach license entitlements to
      cost centers in ILMT.
  - name: Optimization
    description: Right-size the Reserved Capacity tier (Small / Medium / Large) to peak throughput; consolidate
      under-utilized queue managers; consider committed-term contracts via IBM Sales for steady production
      workloads.
  - name: Accountability
    description: Designate a queue-manager owner per business unit; review monthly IBM Cloud invoices and
      ILMT reports against forecasted message throughput.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Subscription + License
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: IBM MQ
  ServiceCategory: Messaging + Integration
  ProviderName: IBM
  PublisherName: IBM Corporation
  InvoiceIssuerName: IBM Corporation
  PricingCategory: Subscription
  PricingUnit: deployment-month
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: deployment_month
    description: Reserved-capacity managed MQ deployment-months (IBM MQ on Cloud)
    unit: deployment-month
    aggregation: sum
    dimensions:
      - tier
      - region
      - environment
  - name: pvu_license
    description: Processor value units licensed for on-premises queue managers
    unit: PVU-month
    aggregation: max
    dimensions:
      - hostname
      - environment
  - name: data_egress
    description: Outbound network bytes from managed MQ deployments
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - destination
  - name: queue_manager_count
    description: Active queue managers under management
    unit: queue-manager
    aggregation: max
    dimensions:
      - team
      - environment
apis:
  - name: IBM MQ REST API
    baseURL: https://{host}:{port}/ibmmq/rest/v2
    tags:
      - Admin
      - Messaging
      - Rest
    serviceName: IBM MQ REST API
    serviceCategory: API
  - name: IBM MQ Messaging REST API
    baseURL: https://{host}:{port}/ibmmq/rest/v2/messaging
    tags:
      - Consumer
      - Messaging
      - Producer
      - Rest
    serviceName: IBM MQ Messaging REST API
    serviceCategory: API
  - name: IBM MQ JMS API
    baseURL: ''
    tags:
      - Java
      - Jms
      - Messaging
    serviceName: IBM MQ JMS API
    serviceCategory: API
  - name: IBM MQ Native API
    baseURL: ''
    tags:
      - Mqi
      - Native
      - Procedural
    serviceName: IBM MQ Native API
    serviceCategory: API
unitEconomics:
  - name: Cost per Million Messages
    metric: billed_cost / (messages_processed / 1000000)
    target: TBD
  - name: Cost per Queue Manager
    metric: billed_cost / queue_manager_count
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
