naftiko: 1.0.0-alpha2
info:
  label: IBM MQ Administration REST API — Queues
  description: 'IBM MQ Administration REST API — Queues. 5 operations. Lead operation: IBM MQ List queues. Self-contained
    Naftiko capability covering one Ibm Mq business surface.'
  tags:
  - Ibm Mq
  - Queues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IBM_MQ_API_KEY: IBM_MQ_API_KEY
capability:
