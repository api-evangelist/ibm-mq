    namespace: admin-rest-queues
    baseUri: https://{host}:{port}/ibmmq/rest/v2
    description: IBM MQ Administration REST API — Queues business capability. Self-contained, no shared references.
    resources:
    - name: admin-qmgr-qmgrName-queue
      path: /admin/qmgr/{qmgrName}/queue
      operations:
      - name: listqueues
        method: GET
        description: IBM MQ List queues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter queues by name (supports wildcard *)
        - name: type
          in: query
          type: string
          description: Filter by queue type
        - name: attributes
          in: query
          type: string
          description: Comma-separated list of attributes to return
        - name: status
          in: query
          type: string
          description: Comma-separated list of status attributes to return
      - name: createqueue
        method: POST
        description: IBM MQ Create a queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin-qmgr-qmgrName-queue-queueName
      path: /admin/qmgr/{qmgrName}/queue/{queueName}
      operations:
      - name: getqueue
        method: GET
        description: IBM MQ Get queue details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: attributes
          in: query
          type: string
          description: Comma-separated list of attributes to return
        - name: status
          in: query
          type: string
          description: Comma-separated list of status attributes to return
      - name: updatequeue
        method: PATCH
        description: IBM MQ Update a queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletequeue
        method: DELETE
        description: IBM MQ Delete a queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: LtpaToken2
      value: '{{env.IBM_MQ_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: admin-rest-queues-rest
    port: 8080
    description: REST adapter for IBM MQ Administration REST API — Queues. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/admin/qmgr/{qmgrname}/queue
      name: admin-qmgr-qmgrname-queue
      description: REST surface for admin-qmgr-qmgrName-queue.
      operations:
      - method: GET
        name: listqueues
        description: IBM MQ List queues
        call: admin-rest-queues.listqueues
        with:
          name: rest.name
          type: rest.type
          attributes: rest.attributes
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
